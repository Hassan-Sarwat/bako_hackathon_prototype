<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bernd das Brot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .pulsate {
            animation: pulsate 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulsate {
            0%   { transform: scale(1);    box-shadow: 0 0 0 0   rgba(93, 64, 55, 0.7); }
            50%  { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(93, 64, 55, 0);   }
            100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(93, 64, 55, 0);   }
        }
        .wave-active {
            background-color: #4A7C7A !important;
            animation: wavePulse 1s infinite ease-in-out;
        }
        .wave-active.delay-1 { animation-delay: 0.075s; }
        .wave-active.delay-2 { animation-delay: 0.15s; }
        @keyframes wavePulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>
</head>
<body class="min-h-screen bg-[#FAF9F6] flex flex-col items-center p-6 text-[#4A3728]">

    <!-- Header -->
    <header class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-[#E8DCC4] bg-stone-200 flex items-center justify-center">
                <img src="/static/img.avif" alt="Chef Portrait" class="w-full h-full object-cover"
                     onerror="this.parentElement.innerHTML='<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'#4A3728\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\'></path><circle cx=\'12\' cy=\'7\' r=\'4\'></circle></svg>'">
            </div>
            <h1 class="text-xl font-bold tracking-tight">Bernd das Brot</h1>
        </div>
        <button class="p-2 hover:bg-stone-200 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="#4A3728" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </header>

    <!-- Status Pill -->
    <div class="bg-[#F0F0EA] px-6 py-2 rounded-full flex items-center gap-3 mb-12 shadow-sm border border-stone-100">
        <div class="flex items-end gap-[2px] h-4">
            <div id="wave1" class="w-1 rounded-full bg-stone-400" style="height: 67%;"></div>
            <div id="wave2" class="w-1 rounded-full bg-stone-400 delay-1" style="height: 100%;"></div>
            <div id="wave3" class="w-1 rounded-full bg-stone-400 delay-2" style="height: 50%;"></div>
        </div>
        <span id="statusText" class="text-[11px] font-bold uppercase tracking-widest text-stone-600">
            The Orb Awaits
        </span>
    </div>

    <!-- Spell Shortcuts -->
    <div class="w-full max-w-md mb-16">
        <h2 class="text-center text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-6">
            Spell Shortcuts
        </h2>
        <div class="grid grid-cols-3 gap-4">

            <!-- Order Scroll -->
            <button class="flex flex-col items-center gap-3 p-4 rounded-2xl bg-[#F0F0EA]/50 hover:bg-[#F0F0EA] transition-all border border-stone-100">
                <div class="w-14 h-14 rounded-xl flex items-center justify-center" style="background-color: #D1F2F2;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                         fill="none" stroke="#4A7C7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                    </svg>
                </div>
                <span class="text-xs font-bold leading-tight text-center">Order Scroll</span>
            </button>

            <!-- Repair Charm -->
            <button class="flex flex-col items-center gap-3 p-4 rounded-2xl bg-[#F0F0EA]/50 hover:bg-[#F0F0EA] transition-all border border-stone-100">
                <div class="w-14 h-14 rounded-xl flex items-center justify-center" style="background-color: #FCE8E8;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                         fill="none" stroke="#A32A2A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
                <span class="text-xs font-bold leading-tight text-center">Repair Charm</span>
            </button>

            <!-- Inspect -->
            <button class="flex flex-col items-center gap-3 p-4 rounded-2xl bg-[#F0F0EA]/50 hover:bg-[#F0F0EA] transition-all border border-stone-100">
                <div class="w-14 h-14 rounded-xl flex items-center justify-center" style="background-color: #E8E6D8;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                         fill="none" stroke="#4A3728" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                </div>
                <span class="text-xs font-bold leading-tight text-center">Inspect</span>
            </button>

        </div>
    </div>

    <!-- Voice Interface -->
    <div class="flex-1 flex flex-col items-center justify-center w-full">
        <div class="relative">
            <!-- Glow layer -->
            <div id="glowEffect" class="absolute inset-0 bg-[#5D4037] opacity-20 blur-3xl rounded-full scale-125 transition-all duration-500 pointer-events-none"></div>

            <button id="talkButton"
                class="relative w-48 h-48 bg-[#5D4037] rounded-full flex flex-col items-center justify-center text-white shadow-2xl transition-all duration-300 active:scale-95 p-4 cursor-pointer">

                <!-- Mic OFF (slash) — shown when idle -->
                <svg id="micIconOff" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     class="mb-4">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                    <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>

                <!-- Mic ON — hidden when idle -->
                <svg id="micIconOn" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     class="mb-4 hidden">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>

                <span id="buttonLabel" class="text-sm font-bold uppercase tracking-wider">Cast</span>
            </button>
        </div>

        <p id="transcript" class="mt-12 italic text-stone-500 text-lg text-center max-w-[300px] min-h-[3rem] leading-relaxed">
            "Wingardium Leviosa! Add 20 sourdough loaves to morning batch"
        </p>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
