<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filialassistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .pulsate {
            animation: pulsate 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulsate {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(139, 92, 246, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
            }
        }

        .glow {
            box-shadow: 0 0 40px -10px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>

<body class="h-screen w-full flex flex-col items-center justify-center font-sans overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div
            class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse">
        </div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse"
            style="animation-delay: 2s;"></div>
    </div>

    <div class="z-10 text-center mb-16 px-4">
        <h1
            class="text-5xl md:text-7xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 mb-6 drop-shadow-sm">
            Filialassistent</h1>
        <p class="text-xl text-slate-300 max-w-lg mx-auto font-light">Wie kann ich dir helfe?</p>
    </div>

    <button id="talkButton"
        class="z-10 w-44 h-44 rounded-full bg-gradient-to-tr from-blue-600 via-purple-600 to-pink-500 flex items-center justify-center shadow-2xl hover:scale-105 transition-all duration-300 group glow cursor-pointer relative overflow-hidden">
        <div
            class="absolute inset-0 bg-white/20 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300">
        </div>
        <svg id="micIcon" class="w-16 h-16 text-white relative z-10 transition-transform duration-300" fill="none"
            stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z">
            </path>
        </svg>
    </button>
    <div id="statusText" class="z-10 mt-10 text-2xl font-medium text-slate-200 min-h-[40px] tracking-wide">Zum Starten
        klicken</div>
    <div id="transcript" class="z-10 mt-6 text-lg text-slate-400 max-w-2xl text-center px-4 italic min-h-[100px]"></div>

    <script src="/static/app.js"></script>
</body>

</html>
